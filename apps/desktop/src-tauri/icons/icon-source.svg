<svg width="1024" height="1024" viewBox="0 0 1024 1024" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <!-- warm dark background that matches the app chrome (not pure black) -->
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#241c16"/>
      <stop offset="1" stop-color="#14110e"/>
    </linearGradient>
    <!-- amber forge gradient, same hues as the in-app Diamond -->
    <linearGradient id="amber" x1="0.15" y1="0" x2="0.85" y2="1">
      <stop offset="0" stop-color="#ffc488"/>
      <stop offset="1" stop-color="#e8792b"/>
    </linearGradient>
    <filter id="soft" x="-40%" y="-40%" width="180%" height="180%">
      <feDropShadow dx="0" dy="16" stdDeviation="30" flood-color="#000000" flood-opacity="0.5"/>
    </filter>
  </defs>
  <rect width="1024" height="1024" fill="url(#bg)"/>
  <g transform="rotate(45 512 512)" filter="url(#soft)">
    <rect x="316" y="316" width="392" height="392" rx="92" fill="url(#amber)"/>
  </g>
</svg>
